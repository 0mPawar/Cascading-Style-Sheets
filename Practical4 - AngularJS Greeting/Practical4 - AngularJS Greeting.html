<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical No. 4 - AngularJS Good Morning</title>

    <!-- AngularJS CDN (AngularJS 1.x - used in labs without CLI setup) -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 40px 50px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .sun {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            color: #e67e22;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>

<!-- AngularJS App -->
<body ng-app="morningApp" ng-controller="MorningCtrl">

    <div class="card">
        <div class="sun">🌅</div>
        <h1>{{ greeting }}</h1>
        <p class="subtitle">{{ message }}</p>
    </div>

    <script>
        // AngularJS Module and Controller
        var app = angular.module('morningApp', []);

        app.controller('MorningCtrl', function($scope) {
            $scope.greeting = "Good Morning!";
            $scope.message  = "Welcome to AngularJS — Practical No. 4";
            $scope.name     = "";
        });
    </script>

</body>
</html>
