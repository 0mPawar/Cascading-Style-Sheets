<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Practical No. 17 - React Hooks</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Practical No. 17 — React Hooks (useState)</h1>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      // 1. Counter Hook
      function CounterHook() {
        const [count, setCount] = useState(0);
        return (
          <div className="card">
            <h2>1️⃣ useState — Counter</h2>
            <div className="big-number">{count}</div>
            <button onClick={() => setCount(count + 1)}>➕ +1</button>
            <button
              onClick={() => setCount(count - 1)}
              style={{ background: "#e74c3c" }}
            >
              ➖ -1
            </button>
            <button
              onClick={() => setCount(0)}
              style={{ background: "#95a5a6" }}
            >
              🔄 Reset
            </button>
          </div>
        );
      }

      // 2. Input Hook
      function InputHook() {
        const [name, setName] = useState("");
        return (
          <div className="card">
            <h2>2️⃣ useState — Text Input</h2>
            <input
              type="text"
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder="Type your name..."
            />
            <div className="output">
              {name ? `Hello, ${name}! 👋` : "Start typing..."}
            </div>
          </div>
        );
      }

      // 3. Toggle Hook
      function ToggleHook() {
        const [isOn, setIsOn] = useState(false);
        return (
          <div className="card">
            <h2>3️⃣ useState — Toggle</h2>
            <div
              className="toggle-box"
              style={{
                background: isOn ? "#27ae60" : "#e74c3c",
                color: "white",
              }}
            >
              {isOn ? "✅ ON" : "❌ OFF"}
            </div>
            <button
              onClick={() => setIsOn(!isOn)}
              style={{ background: isOn ? "#e74c3c" : "#27ae60" }}
            >
              {isOn ? "Turn OFF" : "Turn ON"}
            </button>
          </div>
        );
      }

      // 4. Background Color Hook
      function ColorHook() {
        const [color, setColor] = useState("#3498db");
        const colors = [
          "#e74c3c",
          "#3498db",
          "#2ecc71",
          "#9b59b6",
          "#f39c12",
          "#1abc9c",
        ];
        return (
          <div className="card">
            <h2>4️⃣ useState — Background Color</h2>
            <div className="color-box" style={{ background: color }}>
              {color}
            </div>
            <div>
              {colors.map((c) => (
                <button
                  key={c}
                  onClick={() => setColor(c)}
                  style={{
                    background: c,
                    width: "32px",
                    height: "32px",
                    borderRadius: "50%",
                    padding: 0,
                    margin: "3px",
                  }}
                ></button>
              ))}
            </div>
          </div>
        );
      }

      function App() {
        return (
          <div className="grid">
            <CounterHook />
            <InputHook />
            <ToggleHook />
            <ColorHook />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
